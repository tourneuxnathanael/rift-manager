<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historique — Rift Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page" style="max-width:680px;">
  <p class="eyebrow">JOURNAL DES RELEVÉS</p>
  <h1>Historique des scans</h1>
  <p class="subtitle">Les 50 derniers scans effectués avec ce compte.</p>

  <div id="historyList"></div>
</div>

<script src="js/app.js"></script>
<script>
requireAuth();

async function loadHistory() {
  const container = document.getElementById("historyList");
  try {
    const resp = await apiFetch("/scans/history");
    if (!resp.ok) throw new Error("Impossible de charger l'historique");
    const scans = await resp.json();

    if (scans.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          Aucun scan pour le moment.<br>
          <a href="dashboard.html">Lance ton premier scan →</a>
        </div>
      `;
      return;
    }

    container.innerHTML = scans.map(s => `
      <a href="scan-detail.html?id=${s.id}" class="history-row card-hoverable" style="text-decoration:none; color:inherit;">
        <div>
          <div class="target">${escapeHtml(s.target)}</div>
          <div class="date">${formatDateFr(s.created_at)}</div>
        </div>
        <div class="history-score" style="color:${scoreColor(s.score)};">
          ${s.score}/100 — ${escapeHtml(s.grade)}
        </div>
      </a>
    `).join("");
  } catch (err) {
    container.innerHTML = `<p style="color:var(--fault); font-family:var(--font-mono);">Erreur : ${escapeHtml(err.message)}</p>`;
  }
}

loadHistory();
</script>

</body>
</html>
