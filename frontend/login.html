<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Rift Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page-center">
  <div class="card">
    <p class="eyebrow">ACCÈS</p>
    <h2>Connexion</h2>

    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" required placeholder="toi@exemple.com" />

      <label for="password">Mot de passe</label>
      <input type="password" id="password" required placeholder="••••••••" />

      <p style="text-align:right; margin:8px 0 0 0;">
        <a href="forgot-password.html" style="font-size:0.85rem; color:var(--muted);">Mot de passe oublié ?</a>
      </p>

      <button type="submit" class="btn-block" style="margin-top:14px;">Se connecter</button>
      <div class="form-error" id="errorMsg"></div>
    </form>

    <p style="margin-top:20px; color:var(--muted); font-size:0.9rem;">
      Pas encore de compte ? <a href="signup.html">S'inscrire</a>
    </p>
  </div>
</div>

<script src="js/app.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorMsg = document.getElementById("errorMsg");
  const btn = e.target.querySelector("button");

  errorMsg.style.display = "none";
  btn.disabled = true;

  try {
    const resp = await fetch(API_BASE + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || "Erreur de connexion");

    setToken(data.access_token);
    window.location.href = "dashboard.html";
  } catch (err) {
    errorMsg.textContent = err.message;
    errorMsg.style.display = "block";
  } finally {
    btn.disabled = false;
  }
});
</script>

</body>
</html>
