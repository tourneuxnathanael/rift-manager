<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil — Rift Manager</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page" style="max-width:560px;">
  <h1>Mon profil</h1>

  <div class="card">
    <h2>Informations</h2>
    <p id="planInfo" style="color:var(--muted);"></p>
    <p id="memberSince" style="color:var(--muted); font-size:0.85rem;"></p>
  </div>

  <div class="card">
    <h2>Changer l'email</h2>
    <form id="emailForm">
      <label for="newEmail">Nouvel email</label>
      <input type="email" id="newEmail" required />
      <button type="submit" class="btn-block" style="margin-top:16px;">Mettre à jour l'email</button>
      <div class="form-error" id="emailError"></div>
      <div class="form-success" id="emailSuccess"></div>
    </form>
  </div>

  <div class="card">
    <h2>Changer le mot de passe</h2>
    <form id="passwordForm">
      <label for="currentPassword">Mot de passe actuel</label>
      <input type="password" id="currentPassword" required />

      <label for="newPassword">Nouveau mot de passe</label>
      <input type="password" id="newPassword" required minlength="8" />

      <button type="submit" class="btn-block" style="margin-top:16px;">Mettre à jour le mot de passe</button>
      <div class="form-error" id="passwordError"></div>
      <div class="form-success" id="passwordSuccess"></div>
    </form>
  </div>
</div>

<script src="js/app.js"></script>
<script>
requireAuth();

let currentUser = null;

async function loadProfile() {
  try {
    const resp = await apiFetch("/auth/me");
    if (!resp.ok) throw new Error("Impossible de charger le profil");
    currentUser = await resp.json();

    document.getElementById("newEmail").value = currentUser.email;
    document.getElementById("planInfo").textContent = "Plan actuel : " + (currentUser.plan === "free" ? "Gratuit" : currentUser.plan);
    const d = new Date(currentUser.created_at);
    document.getElementById("memberSince").textContent = "Membre depuis le " + d.toLocaleDateString("fr-FR");
  } catch (err) {
    document.getElementById("planInfo").textContent = "Erreur : " + err.message;
  }
}

document.getElementById("emailForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const newEmail = document.getElementById("newEmail").value.trim();
  const errorBox = document.getElementById("emailError");
  const successBox = document.getElementById("emailSuccess");
  errorBox.style.display = "none";
  successBox.style.display = "none";

  try {
    const resp = await apiFetch("/auth/me", {
      method: "PUT",
      body: JSON.stringify({ email: newEmail })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || "Erreur");

    successBox.textContent = "Email mis à jour avec succès";
    successBox.style.display = "block";
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.style.display = "block";
  }
});

document.getElementById("passwordForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const currentPassword = document.getElementById("currentPassword").value;
  const newPassword = document.getElementById("newPassword").value;
  const errorBox = document.getElementById("passwordError");
  const successBox = document.getElementById("passwordSuccess");
  errorBox.style.display = "none";
  successBox.style.display = "none";

  try {
    const resp = await apiFetch("/auth/me", {
      method: "PUT",
      body: JSON.stringify({ current_password: currentPassword, new_password: newPassword })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || "Erreur");

    successBox.textContent = "Mot de passe mis à jour avec succès";
    successBox.style.display = "block";
    document.getElementById("passwordForm").reset();
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.style.display = "block";
  }
});

loadProfile();
</script>

</body>
</html>
