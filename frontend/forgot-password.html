<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mot de passe oublié — Rift Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page-center">
  <div class="card">
    <p class="eyebrow">ACCÈS // RÉCUPÉRATION</p>
    <h2>Mot de passe oublié</h2>
    <p style="color:var(--muted); margin-top:0;">
      Entre ton email, on t'envoie un lien pour choisir un nouveau mot de passe.
    </p>

    <form id="forgotForm">
      <label for="email">Email</label>
      <input type="email" id="email" required placeholder="toi@exemple.com" />

      <button type="submit" class="btn-block" style="margin-top:20px;">Envoyer le lien</button>
      <div class="form-error" id="errorMsg"></div>
      <div class="form-success" id="successMsg"></div>
    </form>

    <p style="margin-top:20px; color:var(--muted); font-size:0.9rem;">
      <a href="login.html">← Retour à la connexion</a>
    </p>
  </div>
</div>

<script src="js/app.js"></script>
<script>
document.getElementById("forgotForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const errorMsg = document.getElementById("errorMsg");
  const successMsg = document.getElementById("successMsg");
  const btn = e.target.querySelector("button");

  errorMsg.style.display = "none";
  successMsg.style.display = "none";
  btn.disabled = true;

  try {
    const resp = await fetch(API_BASE + "/auth/forgot-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || "Une erreur est survenue");

    successMsg.textContent = data.detail;
    successMsg.style.display = "block";
    e.target.reset();
  } catch (err) {
    errorMsg.textContent = err.message;
    errorMsg.style.display = "block";
  } finally {
    btn.disabled = false;
  }
});
</script>

</body>
</html>
