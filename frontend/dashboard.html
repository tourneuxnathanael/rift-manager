<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner — Rift Manager</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page" style="max-width:680px;">
  <h1>Lancer un audit de sécurité</h1>
  <p class="subtitle">Entre une URL pour scanner les 10 contrôles de sécurité.</p>

  <div id="usageBanner" class="card" style="padding:14px 18px; margin-bottom:20px;"></div>

  <div class="scan-box">
    <input type="text" id="urlInput" placeholder="exemple.com" />
    <button id="scanBtn" onclick="runScan()">Scanner</button>
  </div>

  <div id="loading">Scan en cours...</div>

  <div id="result"></div>
</div>



<script src="js/app.js"></script>
<script>
requireAuth();

const SEVERITY_ORDER = { critical: 0, high: 1, medium: 2, low: 3 };

function scoreColor(score) {
  if (score >= 75) return "var(--green)";
  if (score >= 60) return "var(--yellow)";
  if (score >= 40) return "var(--orange)";
  return "var(--red)";
}

function escapeHtml(str) {
  if (str === null || str === undefined) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function renderCheck(label, passed, detail) {
  return `
    <div class="check">
      <div>
        <div class="label">${escapeHtml(label)}</div>
        <div class="status ${passed ? 'pass' : 'fail'}">${escapeHtml(detail)}</div>
      </div>
      <div style="font-size:1.3rem;">${passed ? '✅' : '⚠️'}</div>
    </div>
  `;
}

function renderVuln(v) {
  return `
    <div class="vuln-card ${v.severity}">
      <div class="vuln-header">
        <div class="vuln-title">${escapeHtml(v.title)}</div>
        <div class="badge ${v.severity}">${escapeHtml(v.severity_label)}</div>
      </div>
      <div class="vuln-body">
        <div class="vuln-section"><strong>Risque :</strong> ${escapeHtml(v.risk)}</div>
        <div class="vuln-section"><strong>Recommandation :</strong> ${escapeHtml(v.recommendation)}</div>
        ${v.evidence ? `<div class="vuln-evidence">${escapeHtml(v.evidence)}</div>` : ""}
      </div>
    </div>
  `;
}

async function loadUsage() {
  const banner = document.getElementById("usageBanner");
  try {
    const resp = await apiFetch("/usage");
    if (!resp.ok) return;
    const u = await resp.json();

    const scansText = u.scans_limit === null
      ? "Scans illimités"
      : `${u.scans_this_month}/${u.scans_limit} scans ce mois-ci`;
    const domainsText = `${u.domains_count}/${u.domains_limit} domaine(s) utilisé(s)`;
    const planLabel = u.plan === "pro" ? "Plan Pro" : "Plan Gratuit";

    banner.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
        <div>
          <strong>${planLabel}</strong>
          <span style="color:var(--muted); margin-left:10px;">${scansText} · ${domainsText}</span>
        </div>
        ${u.plan === "free" ? `<a href="pricing.html" class="btn" style="padding:8px 14px; font-size:0.85rem;">Passer au plan Pro</a>` : ""}
      </div>
    `;
  } catch (err) {
    banner.style.display = "none";
  }
}

loadUsage();

async function runScan() {
  const url = document.getElementById("urlInput").value.trim();
  if (!url) return;

  const btn = document.getElementById("scanBtn");
  const loading = document.getElementById("loading");
  const result = document.getElementById("result");

  btn.disabled = true;
  loading.style.display = "block";
  result.style.display = "none";

  try {
    const resp = await apiFetch("/scan", {
      method: "POST",
      body: JSON.stringify({ url })
    });

    if (!resp.ok) {
      const errData = await resp.json().catch(() => ({}));
      throw new Error(errData.detail || "Scan échoué");
    }
    const data = await resp.json();

    const c = data.checks;
    const vulns = (data.vulnerabilities || []).sort(
      (a, b) => SEVERITY_ORDER[a.severity] - SEVERITY_ORDER[b.severity]
    );

    let vulnsHtml;
    if (vulns.length === 0) {
      vulnsHtml = `<div class="no-vulns">✅ Aucune vulnérabilité détectée par ce scan</div>`;
    } else {
      vulnsHtml = `
        <div class="section-title">⚠️ ${vulns.length} vulnérabilité(s) détectée(s)</div>
        ${vulns.map(renderVuln).join("")}
      `;
    }

    result.innerHTML = `
      <div class="score-card">
        <div class="score-number" style="color:${scoreColor(data.score)}">${data.score}/100</div>
        <div class="grade">Note ${data.grade} — ${data.target}</div>
      </div>

      <div class="section-title">Résumé des contrôles</div>
      ${renderCheck("Redirection HTTPS", c.https_redirect.passed, c.https_redirect.detail)}
      ${renderCheck("Certificat SSL", c.ssl_certificate.passed, c.ssl_certificate.detail)}
      ${renderCheck("Fichiers sensibles", c.exposed_files.passed, c.exposed_files.detail)}
      ${renderCheck("Headers de sécurité", c.security_headers.points === c.security_headers.max_points, c.security_headers.points + "/" + c.security_headers.max_points + " points")}
      ${renderCheck("SPF / DMARC", c.spf_dmarc.passed, c.spf_dmarc.detail)}
      ${renderCheck("Cookies", c.cookies.passed, c.cookies.detail)}
      ${renderCheck("Configuration CORS", c.cors.passed, c.cors.detail)}
      ${renderCheck("Versions TLS", c.tls_version.passed, c.tls_version.detail)}
      ${renderCheck("Fuite d'info serveur", c.server_info_disclosure.passed, c.server_info_disclosure.detail)}
      ${renderCheck("Méthodes HTTP dangereuses", c.dangerous_http_methods.passed, c.dangerous_http_methods.detail)}

      ${vulnsHtml}
    `;
    result.style.display = "block";
    loadUsage();
  } catch (err) {
    result.innerHTML = `<p style="color:var(--red)">Erreur : ${err.message}</p>`;
    result.style.display = "block";
  } finally {
    btn.disabled = false;
    loading.style.display = "none";
  }
}

document.getElementById("urlInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") runScan();
});
</script>

</body>
</html>
