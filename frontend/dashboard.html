<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner — Rift Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page" style="max-width:680px;">
  <p class="eyebrow">NOUVEAU RELEVÉ</p>
  <h1>Lancer un audit de sécurité</h1>
  <p class="subtitle">Entre une URL pour scanner les 10 contrôles de sécurité.</p>

  <div id="usageBanner" class="card" style="padding:14px 18px; margin-bottom:20px;"></div>

  <div class="scan-box">
    <input type="text" id="urlInput" placeholder="exemple.com" />
    <button id="scanBtn" onclick="runScan()">Scanner</button>
  </div>

  <div id="loading">Scan en cours...</div>

  <div id="result"></div>
</div>

<script src="js/app.js"></script>
<script>
requireAuth();

async function loadUsage() {
  const banner = document.getElementById("usageBanner");
  try {
    const resp = await apiFetch("/usage");
    if (!resp.ok) return;
    const u = await resp.json();

    const scansText = u.scans_limit === null
      ? "Scans illimités"
      : `${u.scans_this_month}/${u.scans_limit} scans ce mois-ci`;
    const domainsText = `${u.domains_count}/${u.domains_limit} domaine(s) utilisé(s)`;
    const planLabel = u.plan === "pro" ? "Plan Pro" : "Plan Gratuit";

    banner.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
        <div style="font-family:var(--font-mono); font-size:0.82rem; text-transform:uppercase; letter-spacing:0.04em;">
          <strong>${escapeHtml(planLabel)}</strong>
          <span style="color:var(--muted); margin-left:10px; text-transform:none; letter-spacing:0;">${escapeHtml(scansText)} · ${escapeHtml(domainsText)}</span>
        </div>
        ${u.plan === "free" ? `<a href="pricing.html" class="btn" style="padding:8px 14px; font-size:0.72rem;">Passer au plan Pro</a>` : ""}
      </div>
    `;
  } catch (err) {
    banner.style.display = "none";
  }
}

loadUsage();

async function runScan() {
  const url = document.getElementById("urlInput").value.trim();
  if (!url) return;

  const btn = document.getElementById("scanBtn");
  const loading = document.getElementById("loading");
  const result = document.getElementById("result");

  btn.disabled = true;
  loading.style.display = "block";
  result.style.display = "none";

  try {
    const resp = await apiFetch("/scan", {
      method: "POST",
      body: JSON.stringify({ url })
    });

    if (!resp.ok) {
      const errData = await resp.json().catch(() => ({}));
      throw new Error(errData.detail || "Scan échoué");
    }
    const data = await resp.json();

    result.innerHTML = renderScanResult(data);
    result.style.display = "block";
    loadUsage();
  } catch (err) {
    result.innerHTML = `<p style="color:var(--fault); font-family:var(--font-mono); font-size:0.85rem;">${escapeHtml(err.message)}</p>`;
    result.style.display = "block";
  } finally {
    btn.disabled = false;
    loading.style.display = "none";
  }
}

document.getElementById("urlInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") runScan();
});
</script>

</body>
</html>
