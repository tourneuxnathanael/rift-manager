<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réinitialiser le mot de passe — Rift Manager</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page-center">
  <div class="card">
    <h2>Choisir un nouveau mot de passe</h2>

    <div id="noTokenMsg" style="display:none; color:var(--red);">
      Lien invalide — aucun token trouvé dans l'URL.
      <a href="forgot-password.html">Refaire une demande</a>
    </div>

    <form id="resetForm">
      <label for="newPassword">Nouveau mot de passe</label>
      <input type="password" id="newPassword" required minlength="8" placeholder="8 caractères minimum" />

      <label for="confirmPassword">Confirmer le mot de passe</label>
      <input type="password" id="confirmPassword" required minlength="8" />

      <button type="submit" class="btn-block" style="margin-top:20px;">Réinitialiser le mot de passe</button>
      <div class="form-error" id="errorMsg"></div>
      <div class="form-success" id="successMsg"></div>
    </form>
  </div>
</div>

<script src="js/app.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

if (!token) {
  document.getElementById("noTokenMsg").style.display = "block";
  document.getElementById("resetForm").style.display = "none";
}

document.getElementById("resetForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const newPassword = document.getElementById("newPassword").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const errorMsg = document.getElementById("errorMsg");
  const successMsg = document.getElementById("successMsg");
  const btn = e.target.querySelector("button");

  errorMsg.style.display = "none";
  successMsg.style.display = "none";

  if (newPassword !== confirmPassword) {
    errorMsg.textContent = "Les deux mots de passe ne correspondent pas";
    errorMsg.style.display = "block";
    return;
  }

  btn.disabled = true;

  try {
    const resp = await fetch(API_BASE + "/auth/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, new_password: newPassword })
    });

    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || "Une erreur est survenue");

    successMsg.textContent = "Mot de passe mis à jour ! Redirection vers la connexion...";
    successMsg.style.display = "block";
    setTimeout(() => { window.location.href = "login.html"; }, 2000);
  } catch (err) {
    errorMsg.textContent = err.message;
    errorMsg.style.display = "block";
  } finally {
    btn.disabled = false;
  }
});
</script>

</body>
</html>
