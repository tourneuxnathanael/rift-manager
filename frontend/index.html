<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Manager — Audit de sécurité gratuit</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #38bdf8;
    --green: #4ade80;
    --yellow: #facc15;
    --orange: #fb923c;
    --red: #f87171;
    --text: #e2e8f0;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  h1 { font-size: 1.8rem; margin-bottom: 4px; }
  p.subtitle { color: var(--muted); margin-top: 0; margin-bottom: 32px; text-align: center; }
  .scan-box {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 480px;
  }
  input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: var(--card);
    color: var(--text);
    font-size: 1rem;
  }
  button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #0f172a;
    font-weight: 600;
    cursor: pointer;
    font-size: 1rem;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  #result {
    margin-top: 40px;
    width: 100%;
    max-width: 480px;
    display: none;
  }
  .score-card {
    background: var(--card);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
  }
  .score-number { font-size: 3.5rem; font-weight: 800; }
  .grade { font-size: 1.2rem; color: var(--muted); }
  .check {
    background: var(--card);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .check .label { font-weight: 500; }
  .check .status { font-size: 0.85rem; }
  .pass { color: var(--green); }
  .fail { color: var(--red); }
  #loading { display: none; color: var(--muted); margin-top: 24px; }
</style>
</head>
<body>

<h1>🔒 Rift Manager</h1>
<p class="subtitle">Audit de sécurité gratuit pour ton site en 10 secondes</p>

<div class="scan-box">
  <input type="text" id="urlInput" placeholder="exemple.com" />
  <button id="scanBtn" onclick="runScan()">Scanner</button>
</div>

<div id="loading">Scan en cours...</div>

<div id="result"></div>

<script>
const API_URL = "http://localhost:8000/scan"; // à remplacer par l'URL de prod

function scoreColor(score) {
  if (score >= 75) return "var(--green)";
  if (score >= 60) return "var(--yellow)";
  if (score >= 40) return "var(--orange)";
  return "var(--red)";
}

function renderCheck(label, passed, detail) {
  return `
    <div class="check">
      <div>
        <div class="label">${label}</div>
        <div class="status ${passed ? 'pass' : 'fail'}">${detail}</div>
      </div>
      <div style="font-size:1.3rem;">${passed ? '✅' : '⚠️'}</div>
    </div>
  `;
}

async function runScan() {
  const url = document.getElementById("urlInput").value.trim();
  if (!url) return;

  const btn = document.getElementById("scanBtn");
  const loading = document.getElementById("loading");
  const result = document.getElementById("result");

  btn.disabled = true;
  loading.style.display = "block";
  result.style.display = "none";

  try {
    const resp = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url })
    });

    if (!resp.ok) throw new Error("Scan échoué");
    const data = await resp.json();

    const c = data.checks;
    result.innerHTML = `
      <div class="score-card">
        <div class="score-number" style="color:${scoreColor(data.score)}">${data.score}/100</div>
        <div class="grade">Note ${data.grade} — ${data.target}</div>
      </div>
      ${renderCheck("Redirection HTTPS", c.https_redirect.passed, c.https_redirect.detail)}
      ${renderCheck("Certificat SSL", c.ssl_certificate.passed, c.ssl_certificate.detail)}
      ${renderCheck("Fichiers sensibles", c.exposed_files.passed, c.exposed_files.detail)}
      ${renderCheck("Headers de sécurité", c.security_headers.points === c.security_headers.max_points, c.security_headers.points + "/" + c.security_headers.max_points + " points")}
    `;
    result.style.display = "block";
  } catch (err) {
    result.innerHTML = `<p style="color:var(--red)">Erreur : ${err.message}</p>`;
    result.style.display = "block";
  } finally {
    btn.disabled = false;
    loading.style.display = "none";
  }
}

document.getElementById("urlInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") runScan();
});
</script>

</body>
</html>
