<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Détail du scan — Rift Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page" style="max-width:680px;">
  <p style="font-family:var(--font-mono); font-size:0.78rem;"><a href="history.html">← Retour à l'historique</a></p>
  <div id="loading" style="display:block;">Chargement du relevé...</div>
  <div id="result"></div>
</div>

<script src="js/app.js"></script>
<script>
requireAuth();

async function loadScanDetail() {
  const params = new URLSearchParams(window.location.search);
  const scanId = params.get("id");
  const loading = document.getElementById("loading");
  const result = document.getElementById("result");

  if (!scanId) {
    loading.style.display = "none";
    result.innerHTML = `<p style="color:var(--fault); font-family:var(--font-mono);">Aucun scan spécifié.</p>`;
    return;
  }

  try {
    const resp = await apiFetch(`/scans/history/${scanId}`);
    if (!resp.ok) {
      const errData = await resp.json().catch(() => ({}));
      throw new Error(errData.detail || "Impossible de charger ce scan");
    }
    const data = await resp.json();
    result.innerHTML = renderScanResult(data, formatDateFr(data.scanned_at));
  } catch (err) {
    result.innerHTML = `<p style="color:var(--fault); font-family:var(--font-mono);">${escapeHtml(err.message)}</p>`;
  } finally {
    loading.style.display = "none";
  }
}

loadScanDetail();
</script>

</body>
</html>
