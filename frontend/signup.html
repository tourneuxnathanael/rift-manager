<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription — Rift Manager</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page-center">
  <div class="card">
    <h2>Créer un compte</h2>
    <p style="color:var(--muted); margin-top:0;">Gratuit, sans carte bancaire.</p>

    <form id="signupForm">
      <label for="email">Email</label>
      <input type="email" id="email" required placeholder="toi@exemple.com" />

      <label for="password">Mot de passe</label>
      <input type="password" id="password" required placeholder="8 caractères minimum" minlength="8" />

      <label style="display:flex; align-items:flex-start; gap:8px; margin-top:18px; cursor:pointer;">
        <input type="checkbox" id="acceptTerms" required style="width:auto; margin-top:3px;" />
        <span style="font-size:0.85rem; color:var(--muted);">
          J'accepte les <a href="terms.html" target="_blank">CGU</a> et la
          <a href="privacy.html" target="_blank">politique de confidentialité</a>
        </span>
      </label>

      <button type="submit" class="btn-block" style="margin-top:20px;">Créer mon compte</button>
      <div class="form-error" id="errorMsg"></div>
    </form>

    <p style="margin-top:20px; color:var(--muted); font-size:0.9rem;">
      Déjà un compte ? <a href="login.html">Se connecter</a>
    </p>
  </div>
</div>

<script src="js/app.js"></script>
<script>
document.getElementById("signupForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorMsg = document.getElementById("errorMsg");
  const btn = e.target.querySelector("button");

  errorMsg.style.display = "none";
  btn.disabled = true;

  try {
    const resp = await fetch(API_BASE + "/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || "Erreur lors de l'inscription");

    setToken(data.access_token);
    window.location.href = "dashboard.html";
  } catch (err) {
    errorMsg.textContent = err.message;
    errorMsg.style.display = "block";
  } finally {
    btn.disabled = false;
  }
});
</script>

</body>
</html>
